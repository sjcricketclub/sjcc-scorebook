<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJCC Score Book</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #daeaf7; --bg2: #c2d9ef; --card: rgba(255,255,255,0.88);
    --card-border: rgba(50,120,200,0.18); --header: #1a3a5c; --header2: #1e4d7a;
    --gold: #d4a017; --gold-light: #f0c040; --leather: #b5451b; --leather-dark: #8a3214;
    --ink: #1a2a3a; --ink-soft: #2a3e54; --cream: #f0f6fc; --parchment: #e0edf8;
    --red: #c0392b; --blue: #1a4a7a; --blue-light: #2980b9; --green: #27ae60;
    --shadow: rgba(30,70,120,0.13); --muted: rgba(26,58,92,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: linear-gradient(135deg,#b8d4ee 0%,#daeaf7 40%,#c5ddf2 100%); min-height:100vh; font-family:'Barlow',sans-serif; color:var(--ink); }

  /* HEADER */
  .app-header { background:linear-gradient(135deg,var(--header) 0%,var(--header2) 100%); border-bottom:3px solid var(--gold); padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:64px; position:sticky; top:0; z-index:100; box-shadow:0 4px 18px rgba(0,0,0,0.18); }
  .header-left { display:flex; align-items:center; gap:12px; }
  .sjcc-logo { height:52px; width:auto; }
  .app-title { font-family:'Teko',sans-serif; font-size:1.7rem; font-weight:700; letter-spacing:3px; color:var(--gold-light); text-transform:uppercase; }
  .app-title span { color:#e0edf8; }
  .header-nav { display:flex; gap:6px; }
  .nav-btn { background:transparent; border:1px solid rgba(212,160,23,0.35); color:#c8dff0; padding:5px 14px; font-family:'Barlow',sans-serif; font-size:0.78rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border-radius:4px; transition:all 0.2s; }
  .nav-btn:hover,.nav-btn.active { background:var(--gold); border-color:var(--gold); color:var(--ink); }

  /* CELEBRATION OVERLAY */
  .celebration-overlay { position:fixed; inset:0; z-index:999; display:none; align-items:center; justify-content:center; flex-direction:column; pointer-events:none; }
  .celebration-overlay.active { display:flex; }
  .celebration-bg { position:absolute; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(2px); }
  .celebration-box { position:relative; z-index:1; text-align:center; animation: celebPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes celebPop { from { transform:scale(0.3) rotate(-10deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }
  .celebration-emoji { font-size:7rem; display:block; animation: bounce 0.5s ease infinite alternate; }
  @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-20px); } }
  .celebration-text { font-family:'Teko',sans-serif; font-size:3rem; font-weight:700; letter-spacing:4px; margin-top:10px; text-shadow:0 2px 12px rgba(0,0,0,0.5); }
  .celebration-sub { font-size:1.1rem; font-weight:600; letter-spacing:2px; opacity:0.85; margin-top:4px; }
  .confetti-wrap { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .confetti-piece { position:absolute; top:-20px; width:12px; height:12px; border-radius:2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }

  /* VIEWS */
  .view { display:none; padding:20px; max-width:1100px; margin:0 auto; }
  .view.active { display:block; }
  .section-title { font-family:'Teko',sans-serif; font-size:1.6rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--blue); margin-bottom:16px; border-bottom:2px solid rgba(26,74,122,0.18); padding-bottom:6px; }
  .card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:18px; box-shadow:0 2px 12px var(--shadow); }

  /* GAMES GRID */
  .games-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; margin-top:14px; }
  .game-card { background:white; border:1px solid rgba(26,74,122,0.15); border-radius:10px; padding:18px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; box-shadow:0 2px 10px var(--shadow); }
  .game-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--leather),var(--gold)); }
  .game-card:hover { border-color:var(--blue-light); transform:translateY(-2px); box-shadow:0 6px 20px rgba(26,74,122,0.18); }
  .game-card-title { font-family:'Teko',sans-serif; font-size:1.25rem; letter-spacing:1px; color:var(--blue); }
  .game-card-date { font-size:0.73rem; color:var(--muted); margin-bottom:10px; }
  .game-card-score { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
  .team-score-mini .tname { font-size:0.72rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .team-score-mini .tscore { font-family:'Teko',sans-serif; font-size:1.5rem; font-weight:700; color:var(--ink); }
  .vs-badge { font-family:'Teko',sans-serif; font-size:0.9rem; color:var(--gold); letter-spacing:2px; }
  .game-status { font-size:0.68rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-top:8px; padding:3px 8px; border-radius:20px; display:inline-block; }
  .status-live { background:rgba(192,57,43,0.12); color:#c0392b; border:1px solid rgba(192,57,43,0.4); }
  .status-complete { background:rgba(39,174,96,0.12); color:#27ae60; border:1px solid rgba(39,174,96,0.35); }
  .status-setup { background:rgba(26,74,122,0.1); color:var(--blue); border:1px solid rgba(26,74,122,0.3); }
  .new-game-btn { display:flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--leather),var(--leather-dark)); border:none; color:#fff; padding:10px 22px; font-family:'Teko',sans-serif; font-size:1rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; border-radius:6px; box-shadow:0 3px 12px rgba(181,69,27,0.25); transition:all 0.2s; }
  .new-game-btn:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(181,69,27,0.35); }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(20,40,70,0.55); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border:1px solid rgba(26,74,122,0.2); border-radius:12px; padding:26px; width:92%; max-width:580px; max-height:90vh; overflow-y:auto; box-shadow:0 16px 50px rgba(20,40,70,0.22); }
  .modal-title { font-family:'Teko',sans-serif; font-size:1.5rem; color:var(--blue); letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }

  /* FORM */
  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:0.72rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .form-input,.form-select { width:100%; background:#f4f8fc; border:1px solid rgba(26,74,122,0.18); color:var(--ink); padding:9px 12px; border-radius:6px; font-family:'Barlow',sans-serif; font-size:0.93rem; transition:border-color 0.2s; }
  .form-input:focus,.form-select:focus { outline:none; border-color:var(--blue-light); box-shadow:0 0 0 2px rgba(41,128,185,0.12); }
  .form-select option { background:white; }
  .players-list { max-height:180px; overflow-y:auto; margin-top:6px; border:1px solid rgba(26,74,122,0.1); border-radius:6px; }
  .player-item { display:flex; align-items:center; gap:8px; padding:6px 10px; border-bottom:1px solid rgba(26,74,122,0.07); font-size:0.88rem; }
  .player-item:last-child { border-bottom:none; }
  .player-number { font-family:'Teko',sans-serif; color:var(--blue-light); font-size:1rem; min-width:20px; }
  .player-add-row { display:flex; gap:7px; margin-top:7px; }

  /* BUTTONS */
  .btn { padding:7px 18px; border:none; border-radius:6px; cursor:pointer; font-family:'Barlow',sans-serif; font-weight:600; font-size:0.83rem; letter-spacing:1px; text-transform:uppercase; transition:all 0.15s; }
  .btn-gold { background:linear-gradient(135deg,var(--gold),#b8860b); color:var(--ink); }
  .btn-gold:hover { filter:brightness(1.08); }
  .btn-blue { background:linear-gradient(135deg,var(--blue),var(--blue-light)); color:white; }
  .btn-blue:hover { filter:brightness(1.08); }
  .btn-ghost { background:transparent; border:1px solid rgba(26,74,122,0.25); color:var(--ink); }
  .btn-ghost:hover { border-color:var(--blue); }
  .btn-danger { background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.4); color:#c0392b; }
  .btn-danger:hover { background:rgba(192,57,43,0.2); }
  .btn-sm { padding:4px 11px; font-size:0.73rem; }

  /* SCOREBOARD */
  .scoreboard { background:linear-gradient(135deg,var(--header) 0%,var(--header2) 100%); border-radius:12px; padding:18px 20px; margin-bottom:16px; color:white; position:relative; overflow:hidden; box-shadow:0 4px 18px rgba(26,58,92,0.22); border:2px solid var(--gold); }
  .scoreboard::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%,rgba(212,160,23,0.1) 0%,transparent 70%); pointer-events:none; }
  .innings-label { font-size:0.68rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
  .score-big { font-family:'Teko',sans-serif; font-size:4rem; font-weight:700; line-height:1; color:white; letter-spacing:-2px; }
  .score-big span { font-size:1.8rem; color:rgba(255,255,255,0.6); }
  .overs-display { font-size:0.95rem; color:rgba(255,255,255,0.7); margin-top:2px; }
  .rr-display { font-size:0.82rem; color:var(--gold); margin-top:3px; }

  /* OVER BALLS */
  .over-balls { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .ball { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Teko',sans-serif; font-size:0.9rem; font-weight:600; border:2px solid; }
  .ball-0 { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.18); color:rgba(255,255,255,0.35); }
  .ball-dot { background:rgba(180,180,180,0.18); border-color:rgba(180,180,180,0.4); color:#aaa; }
  .ball-1 { background:rgba(41,128,185,0.2); border-color:rgba(41,128,185,0.55); color:#74b9e0; }
  .ball-2 { background:rgba(41,128,185,0.3); border-color:#2980b9; color:#74b9e0; }
  .ball-3 { background:rgba(39,174,96,0.25); border-color:#27ae60; color:#2ecc71; }
  .ball-4 { background:rgba(212,160,23,0.3); border-color:var(--gold); color:var(--gold-light); font-size:1.05rem; font-weight:700; }
  .ball-6 { background:rgba(181,69,27,0.4); border-color:var(--leather); color:#e07050; font-size:1.05rem; font-weight:700; }
  .ball-W { background:rgba(192,57,43,0.35); border-color:#c0392b; color:#e74c3c; }
  .ball-nb { background:rgba(142,68,173,0.25); border-color:#8e44ad; color:#c39bd3; font-size:0.72rem; }
  .ball-wd { background:rgba(41,128,185,0.12); border-color:rgba(41,128,185,0.35); color:#7fb3d3; font-size:0.72rem; }
  .ball-sr { background:rgba(230,126,34,0.25); border-color:#e67e22; color:#f39c12; font-size:0.72rem; }

  /* LIVE PANELS */
  .live-panels { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  @media(max-width:640px){ .live-panels { grid-template-columns:1fr; } }
  .panel-title { font-family:'Teko',sans-serif; font-size:0.95rem; letter-spacing:2px; color:var(--blue); text-transform:uppercase; margin-bottom:10px; border-bottom:1px solid rgba(26,74,122,0.12); padding-bottom:5px; display:flex; align-items:center; justify-content:space-between; }
  .panel-edit-btn { font-size:0.68rem; font-weight:600; letter-spacing:1px; background:rgba(26,74,122,0.08); border:1px solid rgba(26,74,122,0.2); color:var(--blue); padding:2px 8px; border-radius:4px; cursor:pointer; text-transform:uppercase; }
  .panel-edit-btn:hover { background:rgba(26,74,122,0.15); }
  .batsman-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid rgba(26,74,122,0.07); font-size:0.88rem; }
  .batsman-name { font-weight:500; display:flex; align-items:center; gap:5px; }
  .on-strike { color:var(--blue); font-weight:600; }
  .on-strike::before { content:'★'; font-size:0.65rem; color:var(--gold); }
  .batsman-stats { font-family:'Teko',sans-serif; font-size:1.05rem; color:var(--ink); }
  .sr-stat { font-size:0.68rem; color:var(--muted); }

  /* SCORING */
  .scoring-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  .score-btn { padding:14px 6px; border:2px solid; border-radius:8px; font-family:'Teko',sans-serif; font-size:1.3rem; font-weight:600; cursor:pointer; transition:all 0.14s; text-align:center; }
  .score-btn:hover { transform:translateY(-2px); filter:brightness(1.12); }
  .score-btn:active { transform:translateY(0); }
  .btn-dot { background:rgba(150,150,150,0.12); border-color:rgba(150,150,150,0.35); color:#888; }
  .btn-1 { background:rgba(41,128,185,0.1); border-color:rgba(41,128,185,0.4); color:#2980b9; }
  .btn-2 { background:rgba(41,128,185,0.15); border-color:#2980b9; color:#2980b9; }
  .btn-3 { background:rgba(39,174,96,0.12); border-color:rgba(39,174,96,0.45); color:#27ae60; }
  .btn-4 { background:rgba(212,160,23,0.15); border-color:var(--gold); color:#b8860b; font-size:1.4rem; font-weight:700; }
  .btn-6 { background:rgba(181,69,27,0.12); border-color:var(--leather); color:var(--leather); grid-column:span 2; font-size:1.4rem; font-weight:700; }
  .btn-wicket { background:rgba(192,57,43,0.1); border-color:#c0392b; color:#c0392b; }
  .btn-5 { background:rgba(150,150,150,0.08); border-color:rgba(150,150,150,0.25); color:#aaa; font-size:1.1rem; }
  .extras-row { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:12px; }
  .btn-noball { background:rgba(142,68,173,0.1); border-color:#8e44ad; color:#8e44ad; font-size:0.95rem; }
  .btn-wide { background:rgba(41,128,185,0.08); border-color:rgba(41,128,185,0.35); color:#2980b9; font-size:0.95rem; }
  .btn-bye { background:rgba(150,150,150,0.08); border-color:rgba(150,150,150,0.25); color:#888; font-size:0.95rem; }
  .btn-short { background:rgba(230,126,34,0.1); border-color:#e67e22; color:#e67e22; font-size:0.85rem; }
  .btn-undo { background:rgba(212,160,23,0.1); border-color:var(--gold); color:#b8860b; font-size:0.95rem; }

  /* SCORE TABLE */
  .score-table { width:100%; border-collapse:collapse; font-size:0.83rem; }
  .score-table th { font-family:'Teko',sans-serif; font-size:0.72rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--blue); padding:7px 9px; border-bottom:2px solid rgba(26,74,122,0.15); text-align:left; }
  .score-table td { padding:6px 9px; border-bottom:1px solid rgba(26,74,122,0.07); color:var(--ink); }
  .score-table .out-row td { color:rgba(26,58,92,0.4); }
  .score-table .batting-row td { color:var(--blue); font-weight:500; }

  /* TABS */
  .tab-bar { display:flex; gap:3px; margin-bottom:14px; }
  .tab-btn { padding:6px 16px; background:transparent; border:1px solid rgba(26,74,122,0.2); border-bottom:none; color:var(--muted); font-family:'Barlow',sans-serif; font-size:0.78rem; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border-radius:6px 6px 0 0; transition:all 0.2s; }
  .tab-btn.active { background:white; border-color:rgba(26,74,122,0.2); color:var(--blue); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .result-banner { background:linear-gradient(135deg,rgba(39,174,96,0.12),rgba(26,74,122,0.12)); border:2px solid #27ae60; border-radius:10px; padding:14px 20px; text-align:center; margin-bottom:16px; }
  .result-text { font-family:'Teko',sans-serif; font-size:1.7rem; color:#27ae60; letter-spacing:2px; }
  .mom-banner { background:linear-gradient(135deg,rgba(212,160,23,0.1),rgba(181,69,27,0.1)); border:1px solid var(--gold); border-radius:8px; padding:14px 18px; display:flex; align-items:center; gap:14px; margin-top:14px; }
  .mom-trophy { font-size:2.2rem; }
  .mom-text .mom-label { font-size:0.68rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
  .mom-text .mom-name { font-family:'Teko',sans-serif; font-size:1.5rem; color:var(--ink); }
  .mom-text .mom-stat { font-size:0.78rem; color:var(--muted); }
  .inning-summary-row { background:rgba(26,74,122,0.05); border-radius:6px; padding:9px 13px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(26,74,122,0.1); }
  .inning-summary-row .team-n { font-weight:600; font-size:0.88rem; }
  .inning-summary-row .score-n { font-family:'Teko',sans-serif; font-size:1.35rem; color:var(--ink); }
  .chip { display:inline-block; padding:2px 7px; border-radius:20px; font-size:0.67rem; font-weight:600; letter-spacing:1px; }
  .chip-blue { background:rgba(26,74,122,0.1); color:var(--blue); border:1px solid rgba(26,74,122,0.25); }
  .chip-gold { background:rgba(212,160,23,0.15); color:#b8860b; border:1px solid rgba(212,160,23,0.35); }
  .empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
  .empty-state .big-icon { font-size:3.5rem; margin-bottom:10px; display:block; }
  .divider { height:1px; background:rgba(26,74,122,0.1); margin:16px 0; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:540px){ .two-col { grid-template-columns:1fr; } }
  .extra-run-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .extra-run-btn { padding:10px 16px; border:2px solid rgba(26,74,122,0.25); background:rgba(26,74,122,0.07); border-radius:6px; font-family:'Teko',sans-serif; font-size:1.2rem; cursor:pointer; color:var(--blue); transition:all 0.15s; }
  .extra-run-btn:hover,.extra-run-btn.sel { background:var(--blue); color:white; border-color:var(--blue); }
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:rgba(26,74,122,0.05); }
  ::-webkit-scrollbar-thumb { background:rgba(26,74,122,0.2); border-radius:3px; }
</style>
</head>
<body>

<!-- CELEBRATION OVERLAY -->
<div class="celebration-overlay" id="celebration">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="celebration-bg"></div>
  <div class="celebration-box">
    <span class="celebration-emoji" id="celeb-emoji">🏏</span>
    <div class="celebration-text" id="celeb-text" style="color:#fff"></div>
    <div class="celebration-sub" id="celeb-sub" style="color:rgba(255,255,255,0.8)"></div>
  </div>
</div>

<header class="app-header">
  <div class="header-left">
    <img class="sjcc-logo" id="sjcc-logo" alt="SJCC"/>
    <div class="app-title">SJCC <span>Score Book</span></div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showView('games')">Season</button>
    <button class="nav-btn" id="nav-live" onclick="showView('live')" style="display:none">Live</button>
  </nav>
</header>

<div id="view-games" class="view active">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div class="section-title" style="margin-bottom:0">Season Games</div>
    <button class="new-game-btn" onclick="openNewGameModal()">＋ New Game</button>
  </div>
  <div id="games-grid" class="games-grid"></div>
</div>

<div id="view-live" class="view">
  <div id="live-content"></div>
</div>

<!-- NEW GAME MODAL -->
<div class="modal-overlay" id="modal-new-game">
  <div class="modal">
    <div class="modal-title">New Match Setup</div>
    <div class="two-col">
      <div class="form-group"><label class="form-label">Match Name</label><input class="form-input" id="ng-name" placeholder="e.g. Quarter Final"/></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="ng-date" type="date"/></div>
    </div>
    <div class="two-col">

// ─── STATE ────────────────────────────────────────────────────────────────────
let games = JSON.parse(localStorage.getItem('sjcc_v3') || '[]');
let currentGameId = null;
let tempPlayersA = [], tempPlayersB = [];
let extraType = null, extraSelectedRuns = 0;
let managingTeamIdx = null;

function saveGames() { localStorage.setItem('sjcc_v3', JSON.stringify(games)); }
function getGame() { return games.find(g => g.id === currentGameId); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── CELEBRATION ─────────────────────────────────────────────────────────────
let celebTimer = null;
function showCelebration(type, playerName, extra) {
  const configs = {
    four:    { emoji:'🏏', text:'FOUR!', sub: playerName + ' smashes a boundary!', color:'#f0c040', confetti:['#f0c040','#fff176','#ffd54f','#ffe082'] },
    six:     { emoji:'🚀', text:'SIX!', sub: playerName + ' hits it out of the park!', color:'#e07050', confetti:['#e07050','#ff8a65','#ffb74d','#ff5722'] },
    wicket:  { emoji:'💃', text:'WICKET!', sub: (extra||'Bowler') + ' strikes!', color:'#e74c3c', confetti:['#e74c3c','#c0392b','#ff6b6b','#ff8e53'] }
  };
  const cfg = configs[type];
  if (!cfg) return;
  document.getElementById('celeb-emoji').textContent = cfg.emoji;
  document.getElementById('celeb-text').textContent = cfg.text;
  document.getElementById('celeb-text').style.color = cfg.color;
  document.getElementById('celeb-sub').textContent = cfg.sub;
  spawnConfetti(cfg.confetti);
  document.getElementById('celebration').classList.add('active');
  if (celebTimer) clearTimeout(celebTimer);
  celebTimer = setTimeout(() => document.getElementById('celebration').classList.remove('active'), 2800);
}
function spawnConfetti(colors) {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (8 + Math.random()*10) + 'px';
    el.style.height = (8 + Math.random()*10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random()*2) + 's';
    el.style.animationDelay = (Math.random()*0.8) + 's';
    wrap.appendChild(el);
  }
}

// ─── VIEW ─────────────────────────────────────────────────────────────────────
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if (v==='games') { document.querySelectorAll('.nav-btn')[0].classList.add('active'); renderGames(); }
  if (v==='live')  { document.querySelectorAll('.nav-btn')[1].classList.add('active'); renderLive(); }
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ─── PLAYER SETUP ─────────────────────────────────────────────────────────────
function openNewGameModal() {
  tempPlayersA=[]; tempPlayersB=[];
  renderTempPlayers('a'); renderTempPlayers('b');
  document.getElementById('ng-date').value = new Date().toISOString().slice(0,10);
  ['ng-name','ng-team-a','ng-team-b'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-new-game');
}
function makeFreshPlayer(name) { return {id:uid(),name,runs:0,balls:0,fours:0,sixes:0,out:false,dismissal:'',notBatted:true}; }
function addPlayer(side) {
  const inp=document.getElementById('player-'+side+'-input');
  const name=inp.value.trim(); if(!name) return;
  (side==='a'?tempPlayersA:tempPlayersB).push(makeFreshPlayer(name)); inp.value=''; renderTempPlayers(side);
}
function removeTempPlayer(side,i) { (side==='a'?tempPlayersA:tempPlayersB).splice(i,1); renderTempPlayers(side); }
function renderTempPlayers(side) {
  const arr=side==='a'?tempPlayersA:tempPlayersB;
  document.getElementById('list-'+side).innerHTML=arr.map((p,i)=>`
    <div class="player-item"><span class="player-number">${i+1}</span><span style="flex:1">${p.name}</span>
    <button onclick="removeTempPlayer('${side}',${i})" style="background:none;border:none;color:#c0392b;cursor:pointer;font-size:1rem">×</button></div>`).join('');
}

// ─── MANAGE PLAYERS IN-GAME ───────────────────────────────────────────────────
function openManagePlayers(ti) {
  managingTeamIdx=ti;
  const t=getGame().teams[ti];
  document.getElementById('mp-title').textContent='Manage — '+t.name;
  renderMPList(); openModal('modal-manage-players');
}
function renderMPList() {

function createGame() {
  const name=document.getElementById('ng-name').value.trim()||'Match';
  const date=document.getElementById('ng-date').value;
  const overs=parseInt(document.getElementById('ng-overs').value)||20;
  const tossW=parseInt(document.getElementById('ng-toss-winner').value);
  const tossC=document.getElementById('ng-toss-choice').value;
  const tnA=document.getElementById('ng-team-a').value.trim()||'Team A';
  const tnB=document.getElementById('ng-team-b').value.trim()||'Team B';
  const battingFirst=tossW===0?(tossC==='bat'?0:1):(tossC==='bat'?1:0);
  const mkBS=()=>({overs:0,balls:0,runs:0,wickets:0,maidens:0,wides:0,noballs:0});
  const bsA={},bsB={};
  tempPlayersA.forEach(p=>{bsA[p.id]=mkBS();}); tempPlayersB.forEach(p=>{bsB[p.id]=mkBS();});
  const game={id:uid(),name,date,overs,status:'setup',toss:{winner:tossW===0?tnA:tnB,choice:tossC},
    teams:[{name:tnA,players:tempPlayersA.map(p=>({...p})),bowlerStats:bsA},{name:tnB,players:tempPlayersB.map(p=>({...p})),bowlerStats:bsB}],
    battingFirst,innings:[createInnings(battingFirst,1-battingFirst,overs),null],currentInnings:0,mom:null};
  games.unshift(game); saveGames(); closeModal('modal-new-game'); openGameForScoring(game.id);
}
function createInnings(bt,bwt,overs) {
  return {battingTeam:bt,bowlingTeam:bwt,runs:0,wickets:0,overs:0,balls:0,maxOvers:overs,
    extras:{wides:0,noballs:0,byes:0,legbyes:0},striker:null,nonStriker:null,
    currentBowler:null,lastBowler:null,deliveries:[],overLog:[],currentOverBalls:[],complete:false};
}

    recordBall(`Wd${runs>0?'+'+runs:''}`,false,inn,{type:'wide',runs,legalDelivery:false,bowler:inn.currentBowler,striker:inn.striker});
  } else {

    bs.runs+=1+runs;bs.noballs++;
    recordBall(`NB${runs>0?'+'+runs:''}`,false,inn,{type:'noball',runs,legalDelivery:false,bowler:inn.currentBowler,striker:inn.striker});

function confirmShortRun() {

  recordBall(`SR${credited}`,true,inn,{type:'shortrun',runs:credited,legalDelivery:true,bowler:inn.currentBowler,striker:inn.striker});
  inn.balls=inn.currentOverBalls.filter(b=>!b.startsWith('NB')&&!b.startsWith('Wd')).length;

// ─── SCORING ─────────────────────────────────────────────────────────────────
function score(type,runs) {
  const g=getGame(); if(!g||g.status!=='live')return;
  const inn=g.innings[g.currentInnings]; if(!inn||inn.complete)return;
  if(type==='wicket'){showWicketModal();return;}
  if(type==='wide'||type==='noball'){openExtraModal(type);return;}
  if(type==='shortrun'){openModal('modal-short');return;}
  const bt=g.teams[inn.battingTeam];
  const bs=g.teams[inn.bowlingTeam].bowlerStats[inn.currentBowler];
  const striker=bt.players.find(p=>p.id===inn.striker);
  const strikerName=striker?striker.name:'Batsman';
  if(type==='run'){
    inn.runs+=runs;
    if(striker){striker.runs+=runs;striker.balls++;if(runs===4)striker.fours++;if(runs===6)striker.sixes++;striker.notBatted=false;}
    bs.runs+=runs;bs.balls++;
    if(runs%2===1)swapStrike(inn);
    recordBall(runs===0?'.':String(runs),true,inn,{type:'run',runs,legalDelivery:true,bowler:inn.currentBowler,striker:inn.striker});
    if(runs===4)setTimeout(()=>showCelebration('four',strikerName),100);
    if(runs===6)setTimeout(()=>showCelebration('six',strikerName),100);
  } else if(type==='bye'){
    inn.runs+=runs;inn.extras.byes+=runs;
    if(striker)striker.balls++;bs.balls++;
    if(runs%2===1)swapStrike(inn);
    recordBall(runs===0?'.':'B'+runs,true,inn,{type:'bye',runs,legalDelivery:true,bowler:inn.currentBowler,striker:inn.striker});
  }
  inn.balls=inn.currentOverBalls.filter(b=>!b.startsWith('NB')&&!b.startsWith('Wd')).length;
  checkOverEnd(); saveGames(); renderLive();
}

function recordBall(str,legal,inn,entry) {
  inn.deliveries.push(entry);
  if(!inn.overLog.length)inn.overLog.push([]);
  inn.overLog[inn.overLog.length-1].push(str);
  inn.currentOverBalls.push(str);
}
function swapStrike(inn){[inn.striker,inn.nonStriker]=[inn.nonStriker,inn.striker];}

function checkOverEnd() {
  const g=getGame(),inn=g.innings[g.currentInnings]; if(!inn)return;
  const legal=inn.currentOverBalls.filter(b=>!b.startsWith('NB')&&!b.startsWith('Wd')).length;
  if(legal>=6){
    const bs=g.teams[inn.bowlingTeam].bowlerStats[inn.currentBowler];
    const ovR=inn.currentOverBalls.reduce((s,b)=>{const n=parseInt(b.replace(/[^0-9]/g,''))||0;return s+n;},0);
    if(ovR===0)bs.maidens++;
    bs.overs++;inn.overs++;inn.balls=0;inn.overLog.push([]);inn.currentOverBalls=[];inn.lastBowler=inn.currentBowler;swapStrike(inn);saveGames();
    if(inn.overs>=inn.maxOvers){endInnings();return;}
    showNewOverModal();return;
  }
  inn.balls=legal;
}

// ─── WICKET ──────────────────────────────────────────────────────────────────
function showWicketModal() {
  const g=getGame(),inn=g.innings[g.currentInnings];
  const bt=g.teams[inn.battingTeam],bwt=g.teams[inn.bowlingTeam];
  const inBats=[inn.striker,inn.nonStriker].filter(Boolean);
  document.getElementById('wk-batsman').innerHTML=inBats.map(id=>{const p=bt.players.find(x=>x.id===id);return`<option value="${id}">${p?p.name:id}</option>`;}).join('');
  document.getElementById('wk-fielder').innerHTML='<option value="">—</option>'+bwt.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  const avail=bt.players.filter(p=>!p.out&&!inBats.includes(p.id));
  document.getElementById('wk-next').innerHTML=avail.length?avail.map(p=>`<option value="${p.id}">${p.name}</option>`).join(''):'<option value="">— All Out —</option>';
  document.getElementById('wk-runs').value=0;
  openModal('modal-wicket');
}
function confirmWicket() {
  const g=getGame(),inn=g.innings[g.currentInnings];
  const bt=g.teams[inn.battingTeam],bwt=g.teams[inn.bowlingTeam];
  const bs=bwt.bowlerStats[inn.currentBowler];
  const outId=document.getElementById('wk-batsman').value;
  const type=document.getElementById('wk-type').value;
  const fId=document.getElementById('wk-fielder').value;
  const xRuns=parseInt(document.getElementById('wk-runs').value)||0;
  const nextId=document.getElementById('wk-next').value;
  const bowlerName=bwt.players.find(p=>p.id===inn.currentBowler)?.name||'';
  const outP=bt.players.find(p=>p.id===outId);
  if(outP){outP.out=true;outP.notBatted=false;outP.balls++;
    const fd=fId?bwt.players.find(p=>p.id===fId):null;
    outP.dismissal=type+(fd?` c.${fd.name}`:'')+` b.${bowlerName}`;
  }
  inn.wickets++;inn.runs+=xRuns;bs.wickets++;bs.balls++;bs.runs+=xRuns;
  if(xRuns%2===1)swapStrike(inn);
  if(outId===inn.striker)inn.striker=nextId||null;else inn.nonStriker=nextId||null;
  recordBall('W'+(xRuns>0?'+'+xRuns:''),true,inn,{type:'wicket',runs:xRuns,legalDelivery:true,bowler:inn.currentBowler,striker:outId});
  inn.balls=inn.currentOverBalls.filter(b=>!b.startsWith('NB')&&!b.startsWith('Wd')).length;
  closeModal('modal-wicket');
  // Show bowler dancing
  setTimeout(()=>showCelebration('wicket',outP?outP.name:'Batsman',bowlerName),100);
  if(inn.wickets>=bt.players.length-1||!nextId){saveGames();endInnings();return;}
  checkOverEnd();saveGames();renderLive();
}

    populateSel('ei-opener1',g.teams[bt2].players,p=>p.name,p=>p.id);
    populateSel('ei-opener2',g.teams[bt2].players,p=>p.name,p=>p.id,1);

// ─── UNDO ─────────────────────────────────────────────────────────────────────
function undoLast() {
  const g=getGame();if(!g)return;
  const inn=g.innings[g.currentInnings];if(!inn||!inn.deliveries.length)return;
  const last=inn.deliveries.pop();
  const bt=g.teams[inn.battingTeam],bwt=g.teams[inn.bowlingTeam];
  const bs=bwt.bowlerStats[last.bowler];
  if(last.type==='run'){const p=bt.players.find(x=>x.id===last.striker);if(p){p.runs-=last.runs;p.balls--;if(last.runs===4)p.fours--;if(last.runs===6)p.sixes--;}if(bs){bs.runs-=last.runs;bs.balls--;};inn.runs-=last.runs;}
  else if(last.type==='wide'){inn.runs-=1+last.runs;inn.extras.wides--;if(bs){bs.runs-=1+last.runs;bs.wides--;}}
  else if(last.type==='noball'){inn.runs-=1+last.runs;inn.extras.noballs--;const p=bt.players.find(x=>x.id===last.striker);if(p&&last.runs>0){p.runs-=last.runs;if(last.runs===4)p.fours--;if(last.runs===6)p.sixes--;}if(bs){bs.runs-=1+last.runs;bs.noballs--;bs.balls--;}}
  else if(last.type==='bye'){inn.runs-=last.runs;inn.extras.byes-=last.runs;const p=bt.players.find(x=>x.id===last.striker);if(p)p.balls--;if(bs)bs.balls--;}
  else if(last.type==='wicket'){inn.wickets--;const p=bt.players.find(x=>x.id===last.striker);if(p){p.out=false;p.dismissal='';p.balls--;}if(bs){bs.wickets--;bs.balls--;bs.runs-=last.runs;}inn.runs-=last.runs;}
  else if(last.type==='shortrun'){inn.runs-=last.runs;const p=bt.players.find(x=>x.id===last.striker);if(p){p.runs-=last.runs;p.balls--;}if(bs){bs.runs-=last.runs;bs.balls--;}}
  if(inn.currentOverBalls.length>0){inn.currentOverBalls.pop();if(inn.overLog.length>0)inn.overLog[inn.overLog.length-1].pop();}
  if(last.legalDelivery)inn.balls=Math.max(0,inn.balls-1);
  saveGames();renderLive();
}

// ─── RENDER GAMES ─────────────────────────────────────────────────────────────
function renderGames() {
  const el=document.getElementById('games-grid');
  if(!games.length){el.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><span class="big-icon">🏏</span><p>No games yet — start a new match!</p></div>`;return;}
  el.innerHTML=games.map(g=>{
    const i1=g.innings[0],i2=g.innings[1],t0=g.teams[0],t1=g.teams[1];
    const s0=i1&&i1.battingTeam===0?`${i1.runs}/${i1.wickets}`:(i2&&i2.battingTeam===0?`${i2.runs}/${i2.wickets}`:'—');
    const s1=i1&&i1.battingTeam===1?`${i1.runs}/${i1.wickets}`:(i2&&i2.battingTeam===1?`${i2.runs}/${i2.wickets}`:'—');
    const sc=g.status==='live'?'status-live':g.status==='complete'?'status-complete':'status-setup';
    const st=g.status==='live'?'LIVE':g.status==='complete'?'COMPLETE':'SETUP';
    return`<div class="game-card" onclick="openGameForScoring('${g.id}')">
      <div class="game-card-title">${g.name}</div>
      <div class="game-card-date">${g.date?new Date(g.date+'T12:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''} · ${g.overs} ov</div>
      <div class="game-card-score">
        <div class="team-score-mini"><div class="tname">${t0.name}</div><div class="tscore">${s0}</div></div>
        <div class="vs-badge">VS</div>
        <div class="team-score-mini"><div class="tname">${t1.name}</div><div class="tscore">${s1}</div></div>
      </div><div style="margin-top:8px"><span class="game-status ${sc}">${st}</span></div></div>`;
  }).join('');
}

// ─── RENDER LIVE ─────────────────────────────────────────────────────────────
function renderLive() {
  const g=getGame();if(!g)return;
  const el=document.getElementById('live-content');
  const inn=g.innings[g.currentInnings];
  if(!inn||!inn.striker){el.innerHTML=`<div class="card"><p style="color:var(--muted)">Setting up innings…</p></div>`;return;}
  const bt=g.teams[inn.battingTeam],bwt=g.teams[inn.bowlingTeam];
  const striker=bt.players.find(p=>p.id===inn.striker);
  const nonStriker=bt.players.find(p=>p.id===inn.nonStriker);
  const bowler=bwt.players.find(p=>p.id===inn.currentBowler);
  const bs=bwt.bowlerStats[inn.currentBowler]||{};
  const rr=inn.overs>0||inn.balls>0?(inn.runs/(inn.overs+inn.balls/6)).toFixed(2):'0.00';
  const rrr=g.currentInnings===1&&g.innings[0]?((g.innings[0].runs+1-inn.runs)/Math.max(inn.maxOvers-inn.overs-inn.balls/6,0.1)).toFixed(2):null;

  let resultHTML='';
  if(g.status==='complete'){
    const i1=g.innings[0],i2=g.innings[1];let r='';
    if(i2&&i1){if(i2.runs>i1.runs){const wl=(bt.players.length-1)-i2.wickets;r=`${g.teams[i2.battingTeam].name} won by ${wl} wicket${wl!==1?'s':''}`;}
    else if(i1.runs>i2.runs)r=`${g.teams[i1.battingTeam].name} won by ${i1.runs-i2.runs} run${i1.runs-i2.runs!==1?'s':''}`;else r='Match Tied!';}
    resultHTML=`<div class="result-banner"><div class="result-text">🏆 ${r}</div></div>`;
  }

  const ballHTML=inn.currentOverBalls.map(b=>{
    let c='ball-1';
    if(b==='.')c='ball-dot';else if(b.startsWith('W'))c='ball-W';else if(b.startsWith('NB'))c='ball-nb';
    else if(b.startsWith('Wd'))c='ball-wd';else if(b==='4')c='ball-4';else if(b==='6')c='ball-6';
    else if(b.startsWith('SR'))c='ball-sr';else if(b==='2')c='ball-2';else if(b==='3')c='ball-3';
    return`<div class="ball ${c}">${b}</div>`;
  }).join('')+[...Array(Math.max(0,6-inn.currentOverBalls.length))].map(()=>`<div class="ball ball-0"></div>`).join('');

  const batRows=bt.players.map(p=>{
    const iS=p.id===inn.striker,iN=p.id===inn.nonStriker;
    const sr=p.balls>0?((p.runs/p.balls)*100).toFixed(0):0;
    let st='';
    if(p.out)st=`<span style="font-size:0.72rem;color:var(--muted)">${p.dismissal}</span>`;
    else if(iS)st=`<span class="chip chip-gold">★ Batting</span>`;
    else if(iN)st=`<span class="chip chip-blue">Not out</span>`;
    else if(p.notBatted)st=`<span style="font-size:0.72rem;color:rgba(26,58,92,0.3)">Yet to bat</span>`;
    else st=`<span style="font-size:0.72rem;color:var(--muted)">Not out</span>`;
    return`<tr class="${p.out?'out-row':(iS||iN)?'batting-row':''}">
      <td>${p.name}</td><td style="text-align:center;font-family:'Teko',sans-serif;font-size:1.05rem">${p.notBatted&&!iS&&!iN?'—':p.runs}</td>
      <td style="text-align:center">${p.notBatted&&!iS&&!iN?'—':p.balls}</td>
      <td style="text-align:center">${p.fours||0}</td><td style="text-align:center">${p.sixes||0}</td>
      <td style="text-align:center;font-size:0.72rem;color:var(--muted)">${p.balls>0?sr:'-'}</td><td>${st}</td></tr>`;
  }).join('');

  const bowlRows=bwt.players.filter(p=>{const b=bwt.bowlerStats[p.id];return b&&(b.overs>0||b.balls>0);}).map(p=>{
    const b=bwt.bowlerStats[p.id];const eco=(b.overs+b.balls/6)>0?(b.runs/(b.overs+b.balls/6)).toFixed(1):'—';
    const iC=p.id===inn.currentBowler;
    return`<tr class="${iC?'batting-row':''}"><td>${p.name}${iC?' <span class="chip chip-blue" style="font-size:0.65rem">Bowling</span>':''}</td>
      <td style="text-align:center">${b.overs}.${b.balls}</td><td style="text-align:center">${b.maidens}</td>
      <td style="text-align:center">${b.runs}</td><td style="text-align:center;font-family:'Teko',sans-serif">${b.wickets}</td>
      <td style="text-align:center;color:var(--muted)">${eco}</td></tr>`;
  }).join('');

  const i1=g.innings[0],i2=g.innings[1];
  const sum1=i1?`<div class="inning-summary-row"><div><div class="team-n">${g.teams[i1.battingTeam].name}</div><div style="font-size:0.72rem;color:var(--muted)">1st innings</div></div><div class="score-n">${i1.runs}/${i1.wickets} <span style="font-size:0.85rem;color:var(--muted)">(${i1.overs}.${i1.balls})</span></div></div>`:'';
  const sum2=i2?`<div class="inning-summary-row"><div><div class="team-n">${g.teams[i2.battingTeam].name}</div><div style="font-size:0.72rem;color:var(--muted)">2nd innings</div></div><div class="score-n">${i2.runs}/${i2.wickets} <span style="font-size:0.85rem;color:var(--muted)">(${i2.overs}.${i2.balls})</span></div></div>`:'';
  const momHTML=g.mom?`<div class="mom-banner"><div class="mom-trophy">🏆</div><div class="mom-text"><div class="mom-label">Man of the Match</div><div class="mom-name">${g.mom.name}</div><div class="mom-stat">${g.teams[g.mom.teamIdx].name}</div></div></div>`:'';

  const scoreButtons=g.status==='live'&&!inn.complete?`
  <div class="card" style="margin-bottom:14px">
    <div class="panel-title">Score <span style="font-size:0.7rem;color:var(--muted);letter-spacing:1px">${bt.name} batting</span></div>
    <div class="scoring-grid">
      <button class="score-btn btn-dot" onclick="score('run',0)">•</button>
      <button class="score-btn btn-1" onclick="score('run',1)">1</button>
      <button class="score-btn btn-2" onclick="score('run',2)">2</button>
      <button class="score-btn btn-3" onclick="score('run',3)">3</button>
      <button class="score-btn btn-4" onclick="score('run',4)">4 🏏</button>
      <button class="score-btn btn-6" onclick="score('run',6)">6 🚀</button>
      <button class="score-btn btn-wicket" onclick="score('wicket',0)">OUT 💃</button>
      <button class="score-btn btn-5" onclick="score('run',5)">5</button>
    </div>
    <div class="extras-row">
      <button class="score-btn btn-noball" onclick="score('noball',0)" style="padding:10px 4px;font-size:0.85rem">No Ball</button>
      <button class="score-btn btn-wide" onclick="score('wide',0)" style="padding:10px 4px;font-size:0.85rem">Wide</button>
      <button class="score-btn btn-bye" onclick="score('bye',1)" style="padding:10px 4px;font-size:0.85rem">Bye</button>
      <button class="score-btn btn-short" onclick="score('shortrun',0)" style="padding:10px 4px;font-size:0.82rem">Short Run</button>
      <button class="score-btn btn-undo" onclick="undoLast()" style="padding:10px 4px;font-size:0.85rem">↩ Undo</button>
    </div>
  </div>`:(g.status==='complete'&&!g.mom?`<button class="btn btn-gold" style="margin-bottom:14px" onclick="showMOMModal()">🏆 Man of the Match</button>`:'');

  el.innerHTML=`
    ${resultHTML}
    <div class="scoreboard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <div class="innings-label">INN ${g.currentInnings+1} · ${bt.name} BATTING</div>
          <div class="score-big">${inn.runs}<span>/${inn.wickets}</span></div>
          <div class="overs-display">${inn.overs}.${inn.balls} / ${inn.maxOvers} overs</div>
          <div class="rr-display">RR: ${rr}${rrr?` · RRR: ${rrr}`:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:0.65rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Current Over</div>
          <div class="over-balls" style="justify-content:flex-end">${ballHTML}</div>
          <div style="font-size:0.72rem;color:rgba(255,255,255,0.45);margin-top:5px">
            Extras: ${inn.extras.wides+inn.extras.noballs+inn.extras.byes+inn.extras.legbyes}
            (wd ${inn.extras.wides}, nb ${inn.extras.noballs}, b ${inn.extras.byes}, lb ${inn.extras.legbyes})
          </div>
        </div>
      </div>
    </div>
    <div class="live-panels">
      <div class="card">
        <div class="panel-title">At the Crease ${g.status==='live'?`<button class="panel-edit-btn" onclick="openChangeBat()">Change</button>`:''}</div>
        ${[striker,nonStriker].filter(Boolean).map(p=>`
          <div class="batsman-row">
            <div class="batsman-name ${p.id===inn.striker?'on-strike':''}">${p.name}</div>
            <div style="text-align:right"><div class="batsman-stats">${p.runs} <span style="font-size:0.8rem;color:var(--muted)">(${p.balls})</span></div>
            <div class="sr-stat">4s:${p.fours} 6s:${p.sixes} SR:${p.balls>0?((p.runs/p.balls)*100).toFixed(0):0}</div></div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="panel-title">Bowling ${g.status==='live'?`<button class="panel-edit-btn" onclick="openChangeBowler()">Change</button>`:''}</div>
        ${bowler?`<div class="batsman-row"><div class="batsman-name on-strike">${bowler.name}</div>
          <div style="text-align:right"><div class="batsman-stats">${bs.overs||0}-${bs.maidens||0}-${bs.runs||0}-${bs.wickets||0}</div>
          <div class="sr-stat">Econ:${(bs.overs||0)+(bs.balls||0)/6>0?((bs.runs||0)/((bs.overs||0)+(bs.balls||0)/6)).toFixed(1):'—'}</div></div></div>`:''}
      </div>
    </div>
    ${scoreButtons}
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      ${g.teams.map((t,ti)=>`<button class="btn btn-ghost btn-sm" onclick="openManagePlayers(${ti})">✏️ ${t.name}</button>`).join('')}
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(this,'tab-bat')">Batting</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-bowl')">Bowling</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-match')">Match</button>
    </div>
    <div id="tab-bat" class="tab-content active card">
      <table class="score-table"><thead><tr><th>Batsman</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th><th></th></tr></thead>
      <tbody>${batRows}</tbody></table>
    </div>
    <div id="tab-bowl" class="tab-content card">
      <table class="score-table"><thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Eco</th></tr></thead>
      <tbody>${bowlRows}</tbody></table>
    </div>
    <div id="tab-match" class="tab-content card">
      ${sum1}${sum2}
      <div style="margin-top:10px;font-size:0.8rem;color:var(--muted)">Toss: ${g.toss.winner} chose to ${g.toss.choice}</div>
      ${momHTML}
    </div>`;
}

function switchTab(btn,tabId) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');document.getElementById(tabId)?.classList.add('active');
}

renderGames();
</script>
</body>
</html>
